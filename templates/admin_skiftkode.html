
<!DOCTYPE html>
<html>
<head>
    <title>Skift kode (admin)</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        body {
            background: url('/static/Bg.jpg') no-repeat center center fixed;
            background-size: cover;
            font-family: sans-serif;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .form-box {
            background-color: rgba(0,0,0,0.7);
            padding: 30px;
            border-radius: 10px;
            text-align: center;
        }
        input {
            padding: 10px;
            width: 80%;
            margin: 10px 0;
            border-radius: 5px;
        }
        button {
            padding: 10px;
            border: none;
            border-radius: 8px;
            background-color: rgba(33, 150, 243, 0.5);
            color: white;
            cursor: pointer;
        }
        button:hover {
            background-color: rgba(33, 150, 243, 0.8);
        }
    </style>
</head>
<body>
    <div class="form-box">
        <h2>Ændr adgangskode for admin</h2>
        {% if fejl %}<p style="color: red;">{{ fejl }}</p>{% endif %}
        <form method="post">
            <input type="password" name="ny_kode" placeholder="Ny adgangskode" required>
            <button type="submit">Opdater kode</button>
        </form>
        <form action="/admin" method="get">
            <button type="submit">Tilbage</button>
        </form>
    </div>
</body>
</html>
